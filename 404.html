<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Digital Marketing Academy</title>
    <script>
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const segments = path.split("/");
      const repoBase = segments.length > 2 ? `/${segments[1]}/` : "/";
      const route = path.replace(repoBase, "");
      window.location.replace(`${repoBase}?redirect=${encodeURIComponent(`/${route}${search}${hash}`)}`);
    </script>
  </head>
  <body></body>
  </html>
