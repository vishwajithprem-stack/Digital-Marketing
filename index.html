<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Digital Marketing Academy is a fully offline learning platform for digital marketing practice, quizzes, and certificates."
    />
    <title>Digital Marketing Academy</title>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get("redirect");
        if (redirect) {
          const basePath = window.location.pathname.endsWith("/") ? window.location.pathname.slice(0, -1) : window.location.pathname;
          window.history.replaceState(null, "", `${basePath}${redirect}`);
        }
      })();
    </script>
  </head>
  <body class="bg-night">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
